<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI i förskolan — Familjen Hbg</title>
<meta name="description" content="Föreläsning om AI i förskolan för Familjen Hbg Förskolenätverk, 24 april 2026">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#FAFAF8;--bg-card:#FFFFFF;--bg-grid:#F3F1EE;
--text:#2D2D2D;--text-muted:#6B6B6B;--text-light:#999;
--sage:#7a8f6e;--sage-light:#e8ede5;--sage-dark:#5d7252;
--terra:#c4956a;--terra-light:#f5ece4;--terra-dark:#a87a52;
--coral:#b86e5a;--coral-light:#f5e4df;
--radius:16px;--radius-sm:10px;
--shadow:0 2px 12px rgba(0,0,0,.06);--shadow-hover:0 8px 32px rgba(0,0,0,.1);
--font:'Inter',system-ui,-apple-system,sans-serif;
}
html,body{font-family:var(--font);background:var(--bg);color:var(--text);height:100%;overflow:hidden}

/* ===== GRID VIEW ===== */
#grid-view{display:flex;flex-direction:column;height:100vh;padding:40px 60px;overflow-y:auto;max-width:1400px;margin:0 auto;width:100%}
.grid-header{text-align:center;margin-bottom:48px;padding-top:20px}
.grid-header h1{font-size:3rem;font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,var(--sage),var(--terra));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
.grid-header p{font-size:1.1rem;color:var(--text-muted);font-weight:500;letter-spacing:0.02em}
.section-group{margin-bottom:40px;position:relative}
.section-group::before{content:"";position:absolute;top:18px;left:0;right:0;height:1px;background:rgba(0,0,0,0.06);z-index:0}
.section-label{position:relative;z-index:1;font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:8px 20px;border-radius:30px;display:inline-block;margin-bottom:24px;color:#fff;box-shadow:0 4px 15px rgba(0,0,0,.1)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:24px}
.card{background:var(--bg-card);border-radius:20px;padding:0;cursor:pointer;
  border:1px solid rgba(0,0,0,.06);transition:all .3s cubic-bezier(0.175,0.885,0.32,1.275);position:relative;
  overflow:hidden;box-shadow:var(--shadow); display:flex; flex-direction:column; aspect-ratio:1/1;}
.card:hover{transform:translateY(-8px);box-shadow:0 20px 40px rgba(0,0,0,.08);border-color:var(--sage)}
.card-header-bar{background:rgba(255,255,255,1);padding:16px 20px;border-bottom:1px solid rgba(0,0,0,0.05);flex-shrink:0;z-index:2;}
.card-title{font-size:1.05rem;font-weight:700;line-height:1.2;color:var(--text);margin-bottom:6px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
.card-type{display:inline-block;font-size:.65rem;color:var(--sage-dark);font-weight:700;background:var(--sage-light);padding:4px 10px;border-radius:8px;text-transform:uppercase;letter-spacing:.05em}
.card-image-wrap{width:100%;flex:1;position:relative;overflow:hidden;background:#fff;}
.card-image-wrap img{width:100%;height:100%;object-fit:contain;transition:transform .5s ease; padding:8px;}
.card:hover .card-image-wrap img{transform:scale(1.05)}
.card-id{display:none}

/* ===== SLIDE VIEW ===== */
#slide-view{display:none;height:100vh;flex-direction:column;background:var(--bg)}
.slide-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 32px;
  background:rgba(250,250,248,.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(0,0,0,.05);z-index:10}
.nav-btn{background:none;border:1px solid rgba(0,0,0,.1);border-radius:var(--radius-sm);
  padding:8px 18px;cursor:pointer;font-family:var(--font);font-size:.8rem;color:var(--text-muted);
  transition:all .2s}
.nav-btn:hover{background:var(--sage-light);color:var(--sage-dark);border-color:var(--sage)}
.nav-btn.grid-btn{background:var(--sage);color:#fff;border-color:var(--sage)}
.nav-btn.grid-btn:hover{background:var(--sage-dark)}
.nav-counter{font-size:.8rem;color:var(--text-muted);font-variant-numeric:tabular-nums}
.slide-content{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 60px;overflow-y:auto}
.slide-content.no-padding{padding:0}
.slide-inner{max-width:960px;width:100%;animation:fadeIn .4s ease}
.slide-inner.full-width{max-width:100%;height:100%}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* ===== SLIDE TYPES ===== */
/* Title */
.slide-title{text-align:center}
.slide-title h1{font-size:4rem;font-weight:700;letter-spacing:-.03em;
  background:linear-gradient(135deg,var(--sage),var(--terra));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.slide-title .subtitle{font-size:1.6rem;color:var(--text-muted);margin-top:16px;font-weight:300}
.slide-title .meta{font-size:1.1rem;color:var(--text-light);margin-top:24px}

/* Presenter */
.slide-presenter{display:flex;align-items:center;gap:48px;justify-content:center}
.presenter-avatar{width:180px;height:180px;border-radius:50%;object-fit:cover;
  border:4px solid var(--sage-light);box-shadow:0 4px 20px rgba(0,0,0,.08)}
.presenter-info h2{font-size:2.4rem;font-weight:600}
.presenter-info .ptitle{font-size:1.3rem;color:var(--sage);font-weight:500;margin-top:6px}
.presenter-info .porg{font-size:1.1rem;color:var(--text-muted);margin-top:4px}
.presenter-info .pbio{font-size:1.1rem;color:var(--text-muted);margin-top:16px;max-width:440px;line-height:1.6}

/* Quote / Typewriter */
.slide-quote{text-align:center;max-width:860px;margin:0 auto}
.slide-quote .qtext{font-size:2.4rem;font-weight:300;line-height:1.5;color:var(--text);letter-spacing:-.01em}
.slide-quote .qtext em{font-style:normal;color:var(--sage-dark);font-weight:500}
.slide-quote .qauthor{font-size:1.2rem;color:var(--text-muted);margin-top:32px;font-style:italic}
.typewriter-cursor{display:inline-block;width:2px;height:1.1em;background:var(--sage);margin-left:3px;
  animation:blink 1s step-end infinite;vertical-align:text-bottom}
@keyframes blink{50%{opacity:0}}

/* Grid */
.slide-grid{text-align:center}
.slide-grid h2{font-size:2.4rem;font-weight:600;margin-bottom:36px}
.grid-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;max-width:960px;margin:0 auto}
.grid-card{background:var(--bg-grid);border-radius:var(--radius);padding:32px 28px;text-align:left;
  border:1px solid rgba(0,0,0,.04);transition:all .3s}
.grid-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.grid-card .gc-icon{font-size:2.2rem;margin-bottom:12px}
.grid-card .gc-title{font-size:1.25rem;font-weight:600;margin-bottom:8px}
.grid-card .gc-desc{font-size:1.05rem;color:var(--text-muted);line-height:1.5}

/* Traffic Light */
.slide-traffic{max-width:1200px;margin:0 auto;width:100%}
.slide-traffic h2{font-size:2.4rem;font-weight:600;text-align:center;margin-bottom:36px}
.tl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.tl-section{border-radius:var(--radius);padding:24px 28px;}
.tl-section.green{background:#e8f0e4;border-top:6px solid #5a8a4a}
.tl-section.yellow{background:#fdf6e3;border-top:6px solid #d4a843}
.tl-section.red{background:#fde8e4;border-top:6px solid #c0524a}
.tl-label{font-size:.9rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}
.tl-section.green .tl-label{color:#4a7a3a}
.tl-section.yellow .tl-label{color:#b8922e}
.tl-section.red .tl-label{color:#a8423a}
.tl-list{list-style:none;padding:0}
.tl-list li{font-size:1.05rem;padding:6px 0;color:var(--text);line-height:1.4}
.tl-list li::before{content:"·";margin-right:8px;font-weight:800}

/* Step Slide */
.slide-step{text-align:center;max-width:860px;margin:0 auto}
.slide-step h2{font-size:2.4rem;font-weight:700;margin-bottom:12px}
.slide-step .step-sub{font-size:1.25rem;color:var(--text-muted);margin-bottom:28px}
.slide-step .step-def{font-size:1.25rem;color:var(--text);background:var(--sage-light);
  padding:24px 32px;border-radius:var(--radius);line-height:1.6;margin-bottom:32px;text-align:left}
.step-items{text-align:left}
.step-item{display:flex;gap:16px;padding:16px 0;border-bottom:1px solid rgba(0,0,0,.05)}
.step-item:last-child{border:none}
.step-item .si-title{font-weight:600;min-width:160px;font-size:1.15rem}
.step-item .si-desc{color:var(--text-muted);font-size:1.1rem;line-height:1.5}
.step-footer{margin-top:24px;font-size:1.05rem;color:var(--sage-dark);font-weight:600}

/* Prompt Demo */
.slide-prompt{max-width:860px;margin:0 auto}
.slide-prompt h2{font-size:2.4rem;font-weight:600;text-align:center;margin-bottom:12px}
.slide-prompt .psub{text-align:center;color:var(--text-muted);margin-bottom:32px;font-size:1.15rem}
.prompt-box{background:var(--bg-grid);border-radius:var(--radius);padding:32px;
  font-family:'SF Mono','Fira Code',monospace;font-size:1.1rem;line-height:1.6;color:var(--text);
  border:1px solid rgba(0,0,0,.06);white-space:pre-wrap}
.prompt-example{margin-top:24px;padding:20px 24px;background:var(--terra-light);border-radius:var(--radius-sm);
  font-size:1.05rem;line-height:1.5;color:var(--terra-dark)}
.prompt-example strong{display:block;font-size:.85rem;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.prompt-why{margin-top:24px;font-size:1.05rem;color:var(--text-muted);text-align:center;font-style:italic}

/* ===== RESPONSIVE ===== */
@media(max-width:1024px){
  #grid-view{padding:20px 40px}
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
}
@media(max-width:768px){
  #grid-view{padding:16px 20px}
  .slide-nav{padding:12px 16px}
  .nav-btn{padding:6px 12px;font-size:.75rem}
  .slide-content{padding:24px 20px}
  .slide-content.no-padding{padding:0}
  .slide-title h1{font-size:2.2rem}
  .slide-title .subtitle{font-size:1.1rem}
  .slide-quote .qtext{font-size:1.3rem}
  .grid-cards{grid-template-columns:1fr}
  .slide-presenter{flex-direction:column;text-align:center;gap:24px}
  .presenter-avatar{width:120px;height:120px}
  .presenter-info h2{font-size:1.6rem}
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .step-item{flex-direction:column;gap:4px}
  .step-item .si-title{min-width:auto;margin-bottom:2px}
  .tl-section{padding:16px 20px}
  .prompt-box{padding:16px;font-size:0.8rem}
}
/* ===== LIGHTBOX ===== */
.slide-lightbox {
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  z-index: 9999;
  background: rgba(0,0,0,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}
.slide-lightbox.visible { opacity: 1; pointer-events: auto; }
.slide-lightbox.theme-light { background: rgba(250,250,248,0.95); }
.lightbox-close {
  position: absolute; top: 24px; right: 24px;
  background: transparent; border: 1px solid var(--text-light); color: var(--text-muted);
  padding: 8px 16px; font-family: var(--font); font-size: 0.9rem; cursor: pointer;
  border-radius: var(--radius-sm); transition: all 0.2s;
}
.lightbox-close:hover { background: var(--sage-light); color: var(--sage-dark); border-color: var(--sage); }
.slide-lightbox.theme-dark .lightbox-close { color: #fff; border-color: rgba(255,255,255,0.5); }
.slide-lightbox.theme-dark .lightbox-close:hover { background: rgba(255,255,255,0.1); border-color: #fff; }
.lightbox-content {
  max-width: 1000px; width: 90%; max-height: 90vh; overflow-y: auto;
  padding: 40px; background: var(--bg-card); border-radius: var(--radius);
  box-shadow: 0 20px 60px rgba(0,0,0,0.15); font-family: var(--font);
}
.slide-lightbox.theme-dark .lightbox-content { background: #111; color: #eee; border: 1px solid #333; }

/* ===== PROGRESSION & HERO ===== */
.slide-progression { text-align: center; max-width: 900px; margin: 0 auto; }
.progression-step { font-size: 2.2rem; font-weight: 300; line-height: 1.4; color: var(--text); margin-bottom: 24px; transition: filter 0.8s ease, opacity 0.8s ease; }
.progression-step.blurred { filter: blur(4px); opacity: 0.4; }
.progression-step.hidden { display: none; }
.slide-hero { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: var(--radius); }
.slide-hero img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
.slide-hero .hero-overlay { position: relative; z-index: 2; padding: 40px; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); border-radius: var(--radius); color: #fff; text-align: center; }
.slide-hero h2 { font-size: 3rem; margin-bottom: 12px; }
.slide-hero p { font-size: 1.4rem; color: #ddd; }

@media(max-width:480px){
  .grid-header h1{font-size:2.2rem}
  .grid-header p{font-size:.95rem}
  .slide-title h1{font-size:1.8rem}
  .card-grid{grid-template-columns:1fr}
  .card-header-bar{padding:12px 16px}
  .progression-step{font-size: 1.5rem}
}
</style>
</head>
<body>

<!-- GRID VIEW -->
<div id="grid-view">
  <div class="grid-header">
    <h1>AI i förskolan</h1>
    <p>Familjen Hbg Förskolenätverk · 24 april 2026</p>
  </div>
  <div id="sections-container"></div>
</div>

<!-- SLIDE VIEW -->
<div id="slide-view">
  <nav class="slide-nav">
    <button class="nav-btn" onclick="prevSlide()">← Föregående</button>
    <div style="display:flex; gap: 24px; align-items:center;">
      <button class="nav-btn grid-btn" onclick="showGrid()">☰ Översikt</button>
      <span class="nav-counter" id="nav-counter"></span>
      <button class="nav-btn" onclick="toggleFS()" id="fsBtn">⛶ Helskärm</button>
    </div>
    <button class="nav-btn" onclick="nextSlide()">Nästa →</button>
  </nav>
  <div class="slide-content">
    <div class="slide-inner" id="slide-render"></div>
  </div>
</div>

<!-- Slide Lightbox -->
<div id="slideLightbox" class="slide-lightbox theme-light">
  <button id="lightboxClose" class="lightbox-close">[ STÄNG ]</button>
  <div id="lightboxContent" class="lightbox-content"></div>
</div>

<script>
let DATA=null,currentIndex=0,slides=[];

async function init(){
  const r=await fetch('slides.json');
  DATA=await r.json();
  slides=DATA.slides;
  buildGrid();
  if(location.hash){
    const id=location.hash.slice(1);
    const idx=slides.findIndex(s=>s.id===id);
    if(idx>=0)showSlide(idx);
  }
}

function buildGrid(){
  const c=document.getElementById('sections-container');
  c.innerHTML='';
  const sections=DATA.sections||[];
  const sMap={};
  sections.forEach(s=>sMap[s.id]=s);
  const grouped={};
  slides.forEach((s,i)=>{
    const sec=s.section||'other';
    if(!grouped[sec])grouped[sec]=[];
    grouped[sec].push({slide:s,index:i});
  });
  const order=sections.map(s=>s.id);
  order.forEach(secId=>{
    if(!grouped[secId])return;
    const sec=sMap[secId]||{label:secId,color:'#999'};
    const g=document.createElement('div');
    g.className='section-group';
    const label=document.createElement('span');
    label.className='section-label';
    label.style.background=sec.color;
    label.textContent=sec.label;
    g.appendChild(label);
    const grid=document.createElement('div');
    grid.className='card-grid';
    grouped[secId].forEach(({slide:s,index:i})=>{
      const card=document.createElement('div');
      card.className='card';
      card.innerHTML=`
        <div class="card-header-bar">
          <div class="card-title">${s.title||s.name||s.text?.slice(0,40).replace(/\*/g,'')+'…'||s.id}</div>
          <div class="card-type">${s.type}</div>
        </div>
        <div class="card-image-wrap">
          <img src="assets/cover_${s.id}.png" alt="${s.id}" onerror="this.src='assets/cover_start.png'">
        </div>
        <span class="card-id" style="display:none;">${s.id}</span>
      `;
      card.onclick=()=>showSlide(i);
      grid.appendChild(card);
    });
    g.appendChild(grid);
    c.appendChild(g);
  });
}

function showGrid(){
  document.getElementById('grid-view').style.display='flex';
  document.getElementById('slide-view').style.display='none';
  history.replaceState(null,null,' ');
}

function showSlide(i){
  currentIndex=i;
  document.getElementById('grid-view').style.display='none';
  document.getElementById('slide-view').style.display='flex';
  renderSlide(slides[i]);
  document.getElementById('nav-counter').textContent=`${i+1} / ${slides.length}`;
  history.replaceState(null,null,'#'+slides[i].id);
}

function prevSlide(){if(currentIndex>0)showSlide(currentIndex-1)}
function nextSlide(){if(currentIndex<slides.length-1)showSlide(currentIndex+1)}

function toggleFS(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(err=>{console.log('Error attempting to enable fullscreen:',err);});
    document.getElementById('fsBtn').innerText='🗗 Stäng Helskärm';
  }else{
    if(document.exitFullscreen) document.exitFullscreen();
    document.getElementById('fsBtn').innerText='⛶ Helskärm';
  }
}

function md(t){
  if(!t)return'';
  return t.replace(/\*(.*?)\*/g,'<em>$1</em>');
}

function renderSlide(s){
  const el=document.getElementById('slide-render');
  const contentEl=document.querySelector('.slide-content');
  if(s.type==='iframe'){
    el.classList.add('full-width');
    contentEl.classList.add('no-padding');
  } else {
    el.classList.remove('full-width');
    contentEl.classList.remove('no-padding');
  }
  let h='';
  switch(s.type){
    case'title':
      h=`<div class="slide-title"><h1>${md(s.title)}</h1>
        <div class="subtitle">${md(s.subtitle)}</div>
        <div class="meta">${s.meta||''}</div></div>`;break;
    case'iframe':
      h=`<div style="width:100%; height:100%;"><iframe src="${s.url}" style="width:100%;height:100%;border:none;"></iframe></div>`;
      break;
    case'presenter':
      h=`<div class="slide-presenter">
        <img class="presenter-avatar" src="${s.avatar}" alt="${s.name}" onerror="this.style.display='none'">
        <div class="presenter-info"><h2>${s.name}</h2>
        <div class="ptitle">${s.title}</div><div class="porg">${s.org}</div>
        <div class="pbio">${s.bio||''}</div></div></div>`;break;
    case'quote':
      h=`<div class="slide-quote">
        <div class="qtext">${s.style==='typewriter'?'':md(s.text)}</div>
        ${s.author?`<div class="qauthor">— ${s.author}</div>`:''}
        </div>`;
      if(s.style==='typewriter'){el.innerHTML=h;typewrite(el.querySelector('.qtext'),s.text,s.slowSpeed);return;}
      break;
    case'grid':
      h=`<div class="slide-grid"><h2>${md(s.title)}</h2><div class="grid-cards">
        ${s.cards.map(c=>`<div class="grid-card"><div class="gc-icon">${c.icon}</div>
        <div class="gc-title">${c.title}</div><div class="gc-desc">${c.desc}</div></div>`).join('')}
        </div></div>`;break;
    case'traffic-light':
      h=`<div class="slide-traffic"><h2>${md(s.title)}</h2>
        <div class="tl-grid">
        <div class="tl-section green"><div class="tl-label">🟢 Kör på</div>
        <ul class="tl-list">${s.green.map(i=>`<li>${i}</li>`).join('')}</ul></div>
        <div class="tl-section yellow"><div class="tl-label">🟡 Var försiktig</div>
        <ul class="tl-list">${s.yellow.map(i=>`<li>${i}</li>`).join('')}</ul></div>
        <div class="tl-section red"><div class="tl-label">🛑 Stopp</div>
        <ul class="tl-list">${s.red.map(i=>`<li>${i}</li>`).join('')}</ul></div>
        </div></div>`;break;
    case'step-slide':
      const st=s.steps||[];
      h=`<div class="slide-step">`;
      st.forEach(step=>{
        if(step.type==='headline')h+=`<h2>${step.title}</h2><div class="step-sub">${step.subtitle||''}</div>`;
        if(step.type==='definition')h+=`<div class="step-def">${step.text}</div>`;
        if(step.type==='list'){
          h+=`<div class="step-items">${step.items.map(i=>`<div class="step-item">
            <span class="si-title">${i.title}</span><span class="si-desc">${i.desc}</span></div>`).join('')}</div>`;
          if(step.footer)h+=`<div class="step-footer">${step.footer}</div>`;
        }
      });
      h+=`</div>`;break;
    case'prompt-demo':
      h=`<div class="slide-prompt"><h2>${md(s.title)}</h2>
        <div class="psub">${s.subtitle||''}</div>
        <div class="prompt-box" id="prompt-content-${s.id}">${s.prompt}</div>
        <div style="text-align:right; margin-top:-16px; margin-bottom:16px;">
          <button class="copy-btn" onclick="navigator.clipboard.writeText(document.getElementById('prompt-content-${s.id}').innerText); this.innerText='Kopierad!'; setTimeout(()=>this.innerText='Kopiera', 2000);" style="background:var(--sage-light); border:1px solid var(--sage); color:var(--sage-dark); padding:6px 14px; border-radius:6px; font-size:0.85rem; font-weight:600; cursor:pointer;">Kopiera</button>
        </div>
        ${s.example_topic?`<div class="prompt-example"><strong>Exempel:</strong><br>${s.example_topic}</div>`:''}
        ${s.why?`<div class="prompt-why">${s.why}</div>`:''}
        </div>`;break;
    case'progression':
      h=`<div class="slide-progression" id="progression-${s.id}">
        ${s.steps.map((step, idx) => `<div class="progression-step ${idx > 0 ? 'hidden' : ''}" data-index="${idx}">${md(step)}</div>`).join('')}
      </div>`;
      el.innerHTML=h;
      initProgression(el.querySelector('.slide-progression'), s.steps.length);
      return;
    case'hero-image':
      el.classList.add('full-width');
      contentEl.classList.add('no-padding');
      h=`<div class="slide-hero">
          <img src="${s.image}" alt="${s.title||''}">
          ${s.title||s.subtitle ? `
          <div class="hero-overlay">
            ${s.title ? `<h2>${s.title}</h2>` : ''}
            ${s.subtitle ? `<p>${s.subtitle}</p>` : ''}
          </div>` : ''}
         </div>`;
      break;
    default:
      h=`<div style="text-align:center"><h2>${s.title||s.id}</h2><p>${s.text||''}</p></div>`;
  }
  el.innerHTML=h;
}

function initProgression(container, totalSteps) {
  let currentStep = 0;
  container.dataset.step = 0;
  
  // Custom key handler for progression
  container.progressionHandler = function(e) {
    if (e.key === 'ArrowRight' || e.key === ' ') {
      if (currentStep < totalSteps - 1) {
        e.stopPropagation(); // prevent next slide
        
        // Blur previous
        const prev = container.querySelector(`[data-index="${currentStep}"]`);
        if (prev) prev.classList.add('blurred');
        
        // Show next with typewriter
        currentStep++;
        container.dataset.step = currentStep;
        const next = container.querySelector(`[data-index="${currentStep}"]`);
        if (next) {
          next.classList.remove('hidden');
          const rawText = next.innerHTML;
          typewrite(next, rawText, false);
        }
      }
    }
  };
  document.addEventListener('keydown', container.progressionHandler);
}

// Clean up handlers when leaving slide
const originalNextSlide = nextSlide;
const originalPrevSlide = prevSlide;
const originalShowGrid = showGrid;

function cleanupProgression() {
  const container = document.querySelector('.slide-progression');
  if (container && container.progressionHandler) {
    document.removeEventListener('keydown', container.progressionHandler);
  }
}

nextSlide = function() { cleanupProgression(); originalNextSlide(); };
prevSlide = function() { cleanupProgression(); originalPrevSlide(); };
showGrid = function() { cleanupProgression(); originalShowGrid(); };

function typewrite(el,text,slow){
  const parsed=md(text);
  let i=0,html='';
  const chars=[...parsed];
  el.innerHTML='<span class="typewriter-cursor"></span>';
  const speed=slow?80:35;
  function tick(){
    if(i>=chars.length){el.innerHTML=parsed;return;}
    html+=chars[i];i++;
    el.innerHTML=html+'<span class="typewriter-cursor"></span>';
    const c=chars[i-1];
    const delay=(c==='.'||c==='?'||c==='!')?speed*8:c===','?speed*3:c===' '?speed*1.5:speed;
    setTimeout(tick,delay);
  }
  setTimeout(tick,400);
}

document.addEventListener('keydown',e=>{
  if(document.getElementById('slide-view').style.display==='flex'){
    if(e.key==='ArrowRight'||e.key===' ')nextSlide();
    if(e.key==='ArrowLeft')prevSlide();
    if(e.key==='Escape')showGrid();
  }
});

init();
</script>
</body>
</html>
